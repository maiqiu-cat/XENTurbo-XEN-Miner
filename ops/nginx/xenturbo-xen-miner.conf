server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name miner.xenturbo.io;
    return 301 https://miner.xenturbo.io$request_uri;
}

server {
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    server_name miner.xenturbo.io;

    root /var/www/xenturbo-xen-miner;
    index index.html;

    include /etc/nginx/snippets/xenturbo-security-headers.conf;

    location = /index.html {
        include /etc/nginx/snippets/xenturbo-security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location /assets/ {
        include /etc/nginx/snippets/xenturbo-security-headers.conf;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    ssl_certificate /etc/letsencrypt/live/miner.xenturbo.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miner.xenturbo.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
